<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>乐谱管理</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    label { display: block; margin-top: 1rem; font-weight: 600; }
    input[type="text"], input[type="password"], input[type="file"] { width: 100%; margin-top: 0.25rem; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    .err { color: #c00; margin-top: 0.5rem; }
    .ok { color: #080; margin-top: 0.5rem; }
    pre { background: #f5f5f5; padding: 1rem; overflow: auto; font-size: 12px; }
  </style>
</head>
<body>
  <h1>乐谱管理 <a href="/" style="font-size:0.85rem;font-weight:normal;">首页</a></h1>
  <section id="loginSection">
    <label>用户名</label>
    <input type="text" id="username" autocomplete="username" />
    <label>密码</label>
    <input type="password" id="password" autocomplete="current-password" />
    <button type="button" id="btnLogin">登录</button>
    <div id="loginMsg" class="err"></div>
  </section>
  <section id="uploadSection" style="display:none;">
    <p>已登录。<button type="button" id="btnLogout">退出</button></p>
    <label>songId（目录名，英文/数字/下划线）</label>
    <input type="text" id="songId" placeholder="e.g. santao_che_01" />
    <label>标题（可选，写入 data.json）</label>
    <input type="text" id="title" />
    <label>谱面图片</label>
    <input type="file" id="image" accept="image/*" />
    <label>音频（MP3 / M4A / MIDI）</label>
    <input type="file" id="audio" accept=".mp3,.m4a,.mid,.midi,audio/*" />
    <label>data.json（可选；不上传则生成空 measures）</label>
    <input type="file" id="dataJson" accept=".json,application/json" />
    <button type="button" id="btnUpload">上传发布</button>
    <div id="uploadMsg"></div>
  </section>
  <script>
    const api = (path, opts = {}) => fetch(path, { ...opts, headers: { ...(opts.headers || {}) } });
    let adminToken = localStorage.getItem("yuepu_admin_token") || "";

    function showLogin() {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("uploadSection").style.display = "none";
    }
    function showUpload() {
      document.getElementById("loginSection").style.display = "none";
      document.getElementById("uploadSection").style.display = "block";
    }

    if (adminToken) showUpload();
    else showLogin();

    document.getElementById("btnLogin").onclick = async () => {
      const msg = document.getElementById("loginMsg");
      msg.textContent = "";
      const body = JSON.stringify({
        username: document.getElementById("username").value,
        password: document.getElementById("password").value,
      });
      const r = await api("/admin/login", { method: "POST", headers: { "Content-Type": "application/json" }, body });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) {
        msg.textContent = j.detail || "登录失败";
        return;
      }
      adminToken = j.access_token;
      localStorage.setItem("yuepu_admin_token", adminToken);
      showUpload();
    };

    document.getElementById("btnLogout").onclick = () => {
      adminToken = "";
      localStorage.removeItem("yuepu_admin_token");
      showLogin();
    };

    document.getElementById("btnUpload").onclick = async () => {
      const msg = document.getElementById("uploadMsg");
      msg.textContent = "";
      msg.className = "";
      const songId = document.getElementById("songId").value.trim();
      if (!songId) {
        msg.className = "err";
        msg.textContent = "请填写 songId";
        return;
      }
      const fd = new FormData();
      fd.append("song_id", songId);
      fd.append("title", document.getElementById("title").value.trim());
      const img = document.getElementById("image").files[0];
      const aud = document.getElementById("audio").files[0];
      const dj = document.getElementById("dataJson").files[0];
      if (!img || !aud) {
        msg.className = "err";
        msg.textContent = "请选择图片和音频";
        return;
      }
      fd.append("image", img);
      fd.append("audio", aud);
      if (dj) fd.append("data_json", dj);
      const r = await fetch("/admin/scores", {
        method: "POST",
        headers: { Authorization: "Bearer " + adminToken },
        body: fd,
      });
      const j = await r.json().catch(() => ({}));
      if (!r.ok) {
        msg.className = "err";
        msg.textContent = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail || j);
        return;
      }
      msg.className = "ok";
      msg.textContent = "上传成功: " + JSON.stringify(j);
    };
  </script>
</body>
</html>
